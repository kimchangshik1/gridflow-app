name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-web.txt pip-audit
      - name: Run pip-audit
        run: pip-audit -r requirements-web.txt

  static-security-scan:
    name: Static Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit
      - name: Report All Bandit Findings
        run: bandit -r app ops -x venv || true
      - name: Fail On Medium+ Bandit Findings
        run: bandit -q -r app ops -x venv -ll

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python files
        run: python -m compileall app ops
      - name: Shell syntax check
        shell: bash
        run: |
          shopt -s nullglob
          for file in ops/*.sh; do
            bash -n "$file"
          done
