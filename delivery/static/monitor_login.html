<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OrderLens Ops 로그인</title>
<style>
  body { background:#0A0B0D; color:#e5e7eb; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
  .box { background:rgba(20,22,25,0.9); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:36px 40px; width:360px; }
  h2 { margin:0 0 6px; font-size:18px; }
  p { color:#6b7280; font-size:13px; margin:0 0 20px; }
  label { display:block; font-size:12px; color:#9ca3af; margin-bottom:4px; }
  input { width:100%; box-sizing:border-box; background:#111317; border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#e5e7eb; padding:8px 10px; font-size:14px; margin-bottom:14px; }
  button { width:100%; padding:10px; background:#10B981; border:none; border-radius:6px; color:#fff; font-size:14px; cursor:pointer; }
  button:hover { background:#059669; }
  #msg { margin-top:12px; font-size:13px; text-align:center; min-height:18px; }
  .err { color:#EF4444; }
  .ok { color:#10B981; }
  #confirm-row { display:none; }
</style>
</head>
<body>
<div class="box">
  <h2 id="title">OrderLens Ops 로그인</h2>
  <p id="desc">비밀번호를 입력하세요.</p>
  <form id="form" autocomplete="off">
    <label>비밀번호</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <div id="confirm-row">
      <label>비밀번호 확인</label>
      <input type="password" id="confirm" name="confirm" autocomplete="new-password">
    </div>
    <button type="submit" id="btn">로그인</button>
  </form>
  <div id="msg"></div>
</div>
<script>
let isSetup = false;

async function checkAuthStatus() {
  try {
    const res = await fetch('/monitor/auth-status');
    const d = await res.json();
    if (!d.has_password) {
      isSetup = true;
      document.getElementById('title').textContent = 'OrderLens Ops 비밀번호 설정';
      document.getElementById('desc').textContent = '처음 접속입니다. 사용할 비밀번호를 설정하세요. (8자 이상)';
      document.getElementById('confirm-row').style.display = 'block';
      document.getElementById('btn').textContent = '비밀번호 설정 후 시작';
      document.getElementById('password').setAttribute('autocomplete', 'new-password');
    }
  } catch (e) {
    document.getElementById('msg').className = 'err';
    document.getElementById('msg').textContent = '서버 연결 실패';
  }
}
checkAuthStatus();

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = '';

  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const body = isSetup
    ? { mode: 'setup', password, confirm }
    : { mode: 'login', password };

  try {
    const res = await fetch('/monitor/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      msg.className = 'ok';
      msg.textContent = isSetup ? '설정 완료. 이동 중...' : '로그인 성공. 이동 중...';
      setTimeout(() => { location.href = '/monitor'; }, 600);
    } else {
      const d = await res.json().catch(() => ({}));
      msg.className = 'err';
      msg.textContent = d.detail || '실패';
      btn.disabled = false;
    }
  } catch (e) {
    msg.className = 'err';
    msg.textContent = '요청 실패';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
